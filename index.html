            border-bottom: 1px solid #aaa;
            padding: 15px 0;
        }
        .news-list article:last-child {
            border-bottom: none;
        }
        .full-article .meta {
            color: #aaa;
            font-style: italic;
        }
        .article-content p {
            line-height: 1.6;
            color: #888;
        }

        .article-content img {
            width: 30%;
            height: auto;
            display: block;
            margin: 20px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        footer {
            background-color: #8a9ba0;
            color: #bbb;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
        a {
            color: #aaa;
            cursor: pointer;
            text-decoration: none;
        }
        a:hover {
            color: #ccc;
            text-decoration: underline;
        }
        /* Стили админ-панели (оставляем как в хорошей версии) */
        .admin-container {
            max-width: 800px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .admin-container h2 {
            color: #005f73;
            margin-top: 0;
        }
        .admin-container input, .admin-container button {
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }
        .admin-container input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .admin-container button {
            background-color: #0a9396;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 10px;
        }
        .admin-container button:hover {
            background-color: #005f73;
        }
        .error {
            color: red;
            margin-top: 10px;
        }

                    title: 'Госдума приняла закон о цифровом рубле',
                    category: 'politics',
                    date: '10 февраля 2025',
                    content: `
                        <p>Государственная дума в третьем чтении приняла закон о внедрении цифрового рубля. Новая форма национальной валюты будет выпускаться Банком России и станет дополнением к наличным и безналичным деньгам. Ожидается, что первые операции с цифровым рублем начнутся уже в апреле.</p>
                        <img src="politics_00000001_001.jpg" alt="Цифровой рубль: визуализация">
                        <p>Эксперты отмечают, что это повысит прозрачность финансовых потоков и снизит издержки на переводы. Граждане смогут открывать цифровые кошельки через мобильные приложения банков. Также предполагается, что новая форма денег упростит контроль за целевым расходованием бюджетных средств.</p>
                        <p>По словам председателя Банка России, цифровой рубль не заменит наличные и безналичные деньги, а станет третьей формой российской валюты. Он будет доступен для всех категорий граждан без ограничений. Важно, что проценты на остаток цифровых рублей начисляться не будут, чтобы избежать оттока средств с традиционных счетов.</p>
                        <img src="politics_00000001_002.jpg" alt="Презентация цифрового рубля">
                        <p>Пилотный проект запустят в 11 городах России. Участвовать в нем смогут около 30 банков. Для клиентов все операции с цифровым рублем будут бесплатными. В дальнейшем планируется расширить функционал: с помощью смарт-контрактов можно будет автоматизировать платежи, например, за коммунальные услуги или алименты.</p>
                        <p>Опрошенные эксперты считают, что цифровой рубль укрепит финансовый суверенитет страны и снизит зависимость от западных платежных систем. Однако они предупреждают о необходимости тщательной защиты данных пользователей и отработки механизмов офлайн-платежей.</p>
                        <img src="politics_00000001_003.jpg" alt="Схема работы цифрового рубля">
                        <p>Общественное обсуждение законопроекта проходило несколько месяцев, в нем приняли участие профильные ведомства, банки и представители бизнеса. Поправки, внесенные ко второму чтению, касались усиления защиты персональных данных и порядка взыскания цифровых рублей по долгам. Ожидается, что закон подпишет президент в ближайшие дни.</p>
                        <p>Таким образом, Россия становится одной из первых стран мира, внедряющих государственную цифровую валюту на законодательном уровне. Это событие может стать драйвером развития всей финансовой системы страны.</p>
                    `

                    date: '9 февраля 2025',
                    content: `
                        <p>Совет Федерации одобрил пакет поправок в Налоговый кодекс, касающихся поддержки малого и среднего бизнеса. Ставка страховых взносов для МСП снижается с 15% до 7,6% при превышении минимального размера оплаты труда.</p>
                        <img src="politics_00000002_001.jpg" alt="Заседание Совета Федерации">
                        <p>Кроме того, расширяется перечень расходов, учитываемых при расчете налога на прибыль. Сенаторы подчеркнули, что меры направлены на стимулирование предпринимательской активности в условиях импортозамещения. Закон вступит в силу с 1 марта 2025 года.</p>
                        <p>Новые правила также упрощают порядок применения инвестиционного налогового вычета. Регионы получат право самостоятельно устанавливать его размер в пределах от 0% до 50% от суммы затрат на покупку оборудования. Это особенно важно для обрабатывающих производств и IT-компаний.</p>
                        <img src="politics_00000002_002.jpg" alt="Предприниматели обсуждают налоговые льготы">
                        <p>По оценкам Минэкономразвития, общая налоговая нагрузка на МСП снизится примерно на 12%. Это позволит бизнесу направить высвободившиеся средства на развитие и создание новых рабочих мест. В 2024 году число малых и средних предприятий в России выросло на 5%, и новые меры призваны закрепить эту тенденцию.</p>
                        <p>Дополнительные преференции получат социальные предприниматели и компании, работающие в сфере экологии. Для них будет применяться пониженная ставка налога на прибыль – 15% вместо 20%. Эти изменения вступят в силу с 1 июля 2025 года.</p>
                        <img src="politics_00000002_003.jpg" alt="График снижения налоговой нагрузки">
                        <p>Сенаторы также одобрили поправки о введении единого налогового уведомления для физлиц, которое будет объединять налог на имущество, земельный и транспортный налоги. Это упростит администрирование и снизит количество ошибок. Первое такое уведомление граждане получат уже осенью 2025 года.</p>
                        <p>Таким образом, новый пакет налоговых изменений оценивается как один из самых масштабных за последние годы. Бизнес-объединения положительно отреагировали на инициативы, отметив их сбалансированность и учёт интересов разных отраслей.</p>
                    `
                },
                // Спорт 1
                {
                    id: 'sport1',
                    title: 'Сборная России по футболу обыграла Иран в товарищеском матче',
                    category: 'sport',
                    date: '10 февраля 2025',
                    content: `
                        <p>В товарищеском матче, прошедшем на стадионе «ВТБ Арена» в Москве, сборная России одержала победу над командой Ирана со счётом 2:1. Первый тайм завершился без голов, но во втором наши футболисты активизировались.</p>
                        <img src="sport_00000001_001.jpg" alt="Матч Россия-Иран">
                        <p>На 53-й минуте отличился Артём Дзюба, а на 78-й — Алексей Миранчук. Иранцам удалось забить гол престижа уже в компенсированное время. Главный тренер Валерий Карпин остался доволен действиями команды и назвал матч полезным этапом подготовки к отборочным играм.</p>
                        <p>Особо стоит отметить игру вратаря Матвея Сафонова, который отразил несколько сложных ударов. Также дебютировал 19-летний полузащитник Иван Зазвонкин, вышедший на замену на 70-й минуте. Он провел активный отрезок и создал один голевой момент.</p>
                        <img src="sport_00000001_002.jpg" alt="Игроки сборной России празднуют гол">
                        <p>Сборная Ирана продемонстрировала быстрый и комбинационный футбол, но российская оборона во главе с Георгием Джикией действовала уверенно. Следующий товарищеский матч команда Карпина проведёт 20 марта против сборной Бельгии.</p>
                        <p>Болельщики активно поддерживали команду: трибуны были заполнены почти полностью. По окончании матча футболисты поблагодарили зрителей за поддержку. Этот матч стал первым в 2025 году для сборной России, и победа придаст уверенности перед официальными турнирами.</p>
                        <img src="sport_00000001_003.jpg" alt="Артём Дзюба празднует гол">
                        <p>Капитан команды Артём Дзюба после игры отметил: «Важно было проверить себя в игре с сильным соперником. Мы справились, но есть над чем работать. Рад, что удалось забить. Двигаемся дальше». Следующий сбор команды запланирован на начало марта.</p>
                        <p>Технический штаб сборной проанализирует все моменты и продолжит подготовку к отборочным матчам чемпионата мира 2026 года. Надеемся, что эта победа станет хорошей традицией.</p>
                    `
                },
                // Спорт 2
                {
                    id: 'sport2',
                    title: 'Российские хоккеисты вышли в финал Кубка Первого канала',

                    content: `
                        <p>Сборная России по хоккею разгромила команду Казахстана со счётом 5:1 в полуфинале Кубка Первого канала. Шайбы забросили Никита Гусев (дубль), Михаил Григоренко, Павел Бучневич и Александр Никишин.</p>
                        <img src="sport_00000002_001.jpg" alt="Хоккейная сборная России празднует победу">
                        <p>Голкипер Иван Федотов отразил 32 броска из 33. В финале россияне встретятся со сборной Беларуси, которая ранее оказалась сильнее Чехии. Матч за титул состоится 12 февраля в Санкт-Петербурге.</p>
                        <p>Тренерский штаб отметил великолепную реализацию большинства – три из пяти шайб были заброшены в численном преимуществе. Особенно удачно действовало первое звено в составе Гусева, Григоренко и Бучневича.</p>
                        <img src="sport_00000002_002.jpg" alt="Момент матча Россия-Казахстан">
                        <p>Капитан команда Никита Гусев, оформивший дубль, был признан лучшим игроком матча. «Мы с начала игры действовали уверенно, контролировали шайбу и создавали моменты. Финальная игра будет сложной, Беларусь – хорошая команда, но мы готовы», – сказал Гусев после игры.</p>
                        <p>Матч собрал аншлаг (более 12 тысяч зрителей). Болельщики активно поддерживали сборную, а после финальной сирены скандировали «Молодцы!». Вратарь Иван Федотов был признан лучшим игроком матча по версии зрителей.</p>
                        <img src="sport_00000002_003.jpg" alt="Вратарь Иван Федотов">
                        <p>В параллельном полуфинале сборная Беларуси обыграла Чехию в драматичном матче (3:2 в овертайме). Решающую шайбу забросил нападающий Владимир Алистров. Финальная игра обещает быть напряжённой.</p>
                        <p>Кубок Первого канала – традиционный предновогодний турнир, но в этом году он проходит в феврале из-за переноса. Победа в нём станет хорошей разминкой перед чемпионатом мира, который состоится в мае в Стокгольме.</p>
                    `
                },
                // Технологии 1
                {
                    id: 'tech1',
                    title: 'Яндекс представил новую нейросеть YandexGPT 3',
                    category: 'tech',
                    date: '10 февраля 2025',
                    content: `
                        <p>Компания Яндекс анонсировала третью версию своей языковой модели YandexGPT. Нейросеть стала лучше понимать контекст диалога и генерировать более связные ответы на русском языке.</p>
                        <img src="tech_00000001_001.jpg" alt="Логотип YandexGPT 3">
                        <p>Разработчики утверждают, что модель прошла обучение на расширенном корпусе текстов и теперь способна писать код, сочинять стихи и давать развёрнутые советы. Новая версия уже интегрирована в виртуального помощника Алису и доступна в бета-версии для всех пользователей.</p>
                        <p>Основное отличие YandexGPT 3 – работа с длинным контекстом до 32 тысяч токенов (около 25 тысяч слов). Теперь нейросеть может анализировать целые книги или большие документы, отвечая на вопросы по их содержанию. Это открывает новые возможности для бизнеса и образования.</p>
                        <img src="tech_00000001_002.jpg" alt="Сравнение версий YandexGPT">
                        <p>Также значительно улучшилась работа с русским языком – модель лучше понимает идиомы, сарказм и неоднозначные высказывания. В тестах она показала более высокую точность, чем предыдущая версия на 27%.</p>
                        <p>Яндекс также представил API для разработчиков, которое позволяет интегрировать YandexGPT 3 в сторонние приложения. Стоимость использования будет зависеть от количества токенов и сложности запросов. Некоторые функции, например, генерация изображений по тексту, будут доступны в отдельном сервисе Yandex Art.</p>
                        <img src="tech_00000001_003.jpg" alt="Интерфейс взаимодействия с YandexGPT">
                        <p>Пользователи уже могут протестировать новую модель в веб-версии Алисы, выбрав режим «YandexGPT 3». По отзывам бета-тестеров, нейросеть стала более «живой» и реже выдаёт ошибочные факты («галлюцинации»).</p>
                        <p>В ближайшем будущем Яндекс планирует выпустить мобильное приложение на базе новой модели с расширенными возможностями голосового взаимодействия. Таким образом, YandexGPT 3 выходит на уровень ведущих мировых языковых моделей.</p>
                    `
                },
                // Технологии 2
                {
                    id: 'tech2',
                    title: 'В России создали квантовый процессор с 50 кубитами',
                    category: 'tech',
                    date: '8 февраля 2025',
                    content: `

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                window.logPageView(window.location.pathname + window.location.hash, document.title);
                logPerformanceMetrics();
            });
        } else {
            window.logPageView(window.location.pathname + window.location.hash, document.title);
            logPerformanceMetrics();
        }

        let scrollTimeout;
        window.addEventListener('scroll', function() {
            if (!window.METRIKA_CURRENT_PAGE) return;
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(function() {
                const scrollHeight = document.documentElement.scrollHeight;
                const winHeight = window.innerHeight;
                let percent = Math.round((window.scrollY + winHeight) / scrollHeight * 100);
                percent = Math.min(100, percent);
                const thresholds = [25, 50, 75, 100];
                for (let t of thresholds) {
                    if (percent >= t && !window.METRIKA_SCROLL_SENT_DEPTHS[t]) {
                        window.METRIKA_SCROLL_SENT_DEPTHS[t] = true;
                        sendEvent('scroll_depth', { depth: t });
                    }
                }
                if (percent > window.METRIKA_MAX_SCROLL) window.METRIKA_MAX_SCROLL = percent;
            }, 200);
        });

        document.addEventListener('click', function(e) {
            if (!window.METRIKA_CURRENT_PAGE) return;
            let target = e.target.tagName;
            if (e.target.id) target += '#' + e.target.id;
            if (e.target.className && typeof e.target.className === 'string') target += '.' + e.target.className;
            else if (e.target.classList && e.target.classList.length) target += '.' + Array.from(e.target.classList).join('.');
            sendEvent('clicks', { x: e.clientX, y: e.clientY, target: target });
        });

        window.addEventListener('beforeunload', function() {
            if (window.METRIKA_CURRENT_PAGE) {
                sendEvent('page_exits', { fromPage: window.METRIKA_CURRENT_PAGE, timeSpentMs: Date.now() - window.METRIKA_PAGE_START, maxScroll: window.METRIKA_MAX_SCROLL });
            }
        });

        setTimeout(() => {
            if (document.documentElement.scrollHeight <= window.innerHeight && !window.METRIKA_SCROLL_SENT_DEPTHS[100]) {
                window.METRIKA_SCROLL_SENT_DEPTHS[100] = true;
                if (window.METRIKA_MAX_SCROLL < 100) window.METRIKA_MAX_SCROLL = 100;
                sendEvent('scroll_depth', { depth: 100 });
            }
        }, 500);
    </script>

    <!-- ========== АДМИН-ПАНЕЛЬ (обёрнута в маркеры для удаления при экспорте) ========== -->
   <!-- START_ADMIN -->
<script>
(function() {
    let adminActive = false;
    let originalContent = null;

    // --- Очистка кода сайта от админ-панели (та же, что была) ---
    function getCleanSiteCode() {
        const cloneDoc = document.cloneNode(true);
        const scripts = cloneDoc.querySelectorAll('script');
        for (let script of scripts) {
            if (script.textContent.includes('START_ADMIN') || 
                script.textContent.includes('adminAwareRouter') ||
                script.textContent.includes('showAdminLogin') ||
                script.textContent.includes('getCleanSiteCode')) {
                script.remove();
            }
        }
        const adminContainers = cloneDoc.querySelectorAll('.admin-container');
        adminContainers.forEach(el => el.remove());
        const styleNodes = cloneDoc.querySelectorAll('style');
        for (let style of styleNodes) {
            if (style.textContent.includes('.admin-container')) {
                style.remove();
            }
        }
        let html = cloneDoc.documentElement.outerHTML;
        html = html.replace(/<!-- START_ADMIN -->/g, '');
        html = html.replace(/<!-- END_ADMIN -->/g, '');
        html = html.replace(/\n\s*\n/g, '\n');
        return '<!DOCTYPE html>\n' + html;
    }

    // ---------- ЛОГИН И ПАНЕЛЬ УПРАВЛЕНИЯ ----------
    function showAdminLogin() {
        if (!originalContent) originalContent = document.getElementById('content').innerHTML;
        document.getElementById('content').innerHTML = `
            <div class="admin-container">
                <h2>Вход в панель администратора</h2>
                <input type="text" id="login" placeholder="Логин" />
                <input type="password" id="password" placeholder="Пароль" />
                <button id="loginBtn">Войти</button>
                <div id="loginError" class="error"></div>
            </div>
        `;
        const pwdField = document.getElementById('password');
        if (pwdField) pwdField.type = 'password';
        const loginBtn = document.getElementById('loginBtn');
        loginBtn.addEventListener('click', () => {
            const login = document.getElementById('login').value;
            const pwd = document.getElementById('password').value;
            if (login === 'admin' && pwd === '66665555') {
                showAdminPanel();
            } else {
                const errDiv = document.getElementById('loginError');
                errDiv.innerText = 'Неверный логин или пароль';
                const pwdField2 = document.getElementById('password');
                if (pwdField2) {
                    pwdField2.value = '';
                    pwdField2.type = 'password';
                }
            }
        });
        adminActive = true;
    }

    function showAdminPanel() {
        document.getElementById('content').innerHTML = `
            <div class="admin-container">
                <h2>Панель экспорта метрик</h2>
                <label>Ограничение записей (только целое положительное число):</label>
                <input type="text" id="limitInput" placeholder="например, 100" />
                <div style="margin-top: 20px;">
                    <button id="exportMetricsBtn">Получить метрики</button>
                    <button id="exportFullBtn">Получить полный файл для анализа</button>
                    <button id="sendToLLMBtn" style="background-color: #6c757d;">Отправить в LLM</button>
                </div>
                <div id="exportStatus" class="success"></div>
                <div id="exportError" class="error"></div>
            </div>
        `;

        const limitInput = document.getElementById('limitInput');
        const exportMetricsBtn = document.getElementById('exportMetricsBtn');
        const exportFullBtn = document.getElementById('exportFullBtn');
        const sendToLLMBtn = document.getElementById('sendToLLMBtn');
        const statusDiv = document.getElementById('exportStatus');
        const errorDiv = document.getElementById('exportError');

        // --- Общая функция получения метрик из Firestore ---
        async function fetchMetrics(limit) {
            const collections = ['page_views', 'clicks', 'scroll_depth', 'page_exits', 'performance_metrics'];
            let result = {};
            for (const col of collections) {
                const snapshot = await db.collection(col).get();
                const docs = [];
                snapshot.forEach(doc => {
                    let data = doc.data();
                    if (data.userAgent) delete data.userAgent;
                    if (data.timestamp && data.timestamp.toDate) data.timestamp = data.timestamp.toDate().toISOString();
                    docs.push({ id: doc.id, ...data });
                });
                docs.sort((a, b) => (a.timestamp || '').localeCompare(b.timestamp || ''));
                const filtered = docs.filter(record => {
                    const urls = [record.pageUrl, record.url, record.fromPage];
                    for (let u of urls) if (u && (u.includes('#/admin') || u.includes('/admin'))) return false;
                    return true;
                });
                result[col] = (limit && limit > 0) ? filtered.slice(-limit) : filtered;
            }
            return result;
        }

        // --- Экспорт только метрик (JSON) ---
        async function exportMetricsOnly() {
            errorDiv.innerText = '';
            const limitRaw = limitInput.value.trim();
            let limit = null;
            if (limitRaw !== '') {
                if (!/^\d+$/.test(limitRaw)) {
                    errorDiv.innerText = 'Ошибка: введите целое положительное число.';
                    limitInput.value = '';
                    return;
                }
                limit = parseInt(limitRaw, 10);
                if (limit <= 0) {
                    errorDiv.innerText = 'Ошибка: число должно быть больше 0.';
                    limitInput.value = '';
                    return;
                }
            }
            statusDiv.innerText = 'Загрузка данных...';
            try {
                const metrics = await fetchMetrics(limit);
                const blob = new Blob([JSON.stringify(metrics, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'metrics_export.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                statusDiv.innerText = 'Готово! Файл метрик скачан.';
            } catch (err) {
                errorDiv.innerText = 'Ошибка: ' + err.message;
            }
        }

        // --- Экспорт полного файла (метрики + код) ---
        async function exportFullTxt() {
            errorDiv.innerText = '';
            const limitRaw = limitInput.value.trim();
            let limit = null;
            if (limitRaw !== '') {
                if (!/^\d+$/.test(limitRaw)) {
                    errorDiv.innerText = 'Ошибка: введите целое положительное число.';
                    limitInput.value = '';
                    return;
                }
                limit = parseInt(limitRaw, 10);
                if (limit <= 0) {
                    errorDiv.innerText = 'Ошибка: число должно быть больше 0.';
                    limitInput.value = '';
                    return;
                }
            }
            statusDiv.innerText = 'Загрузка метрик и кода сайта...';
            try {
                const metrics = await fetchMetrics(limit);
                const metricsJson = JSON.stringify(metrics, null, 2);
                const siteCode = getCleanSiteCode();
                const content = `---METRICS---\n${metricsJson}\n---SITE_CODE---\n${siteCode}`;
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'full_export.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                statusDiv.innerText = 'Готово! Файл с метриками и кодом скачан.';
            } catch (err) {
                errorDiv.innerText = 'Ошибка: ' + err.message;
            }
        }

        // --- НОВАЯ ФУНКЦИЯ: отправка в LLM (облачный Ollama) ---
        async function sendToLLM() {
            errorDiv.innerText = '';
            const limitRaw = limitInput.value.trim();
            let limit = null;
            if (limitRaw !== '') {
                if (!/^\d+$/.test(limitRaw)) {
                    errorDiv.innerText = 'Ошибка: введите целое положительное число.';
                    limitInput.value = '';
                    return;
                }
                limit = parseInt(limitRaw, 10);
                if (limit <= 0) {
                    errorDiv.innerText = 'Ошибка: число должно быть больше 0.';
                    limitInput.value = '';
                    return;
                }
            }
            statusDiv.innerText = 'Подготовка данных для LLM...';
            try {
                const metrics = await fetchMetrics(limit);
                const metricsJson = JSON.stringify(metrics, null, 2);
                const siteCode = getCleanSiteCode();
                const content = `---METRICS---\n${metricsJson}\n---SITE_CODE---\n${siteCode}`;

                statusDiv.innerText = 'Отправка в LLM...';
                // Укажите правильный эндпоинт (ниже пример для OpenAI‑совместимого API)
                const apiUrl = 'https://api.ollama.ai/v1/chat/completions';  // замените при необходимости
                const apiKey = '3da0eb58533548bfa6bac2e7cf64a245.W3IRCOfn0GkUPnX7IrKTcR_d';
                const modelName = 'deepseek-v4-flash:cloud';  // ваша модель

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: modelName,
                        messages: [{ role: 'user', content: content }],
                        stream: false
                    })
                });
                if (!response.ok) {
                    let errText = await response.text();
                    throw new Error(`Ошибка API (${response.status}): ${errText}`);
                }
                const data = await response.json();
                // Поле с ответом может называться по-разному – подстройте под ваш API
                const llmAnswer = data.choices?.[0]?.message?.content || data.response || data.result || 'Нет ответа от LLM';
                
                // Скачиваем ответ
                const blob = new Blob([llmAnswer], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'llm_response.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                statusDiv.innerText = 'Готово! Ответ LLM скачан.';
            } catch (err) {
                errorDiv.innerText = 'Ошибка при обращении к LLM: ' + err.message;
                console.error(err);
            }
        }

        exportMetricsBtn.addEventListener('click', exportMetricsOnly);
        exportFullBtn.addEventListener('click', exportFullTxt);
        sendToLLMBtn.addEventListener('click', sendToLLM);
    }

    // --- РОУТЕР ДЛЯ АДМИНКИ (перехват #/admin) ---
    const originalRouter = window.originalRouterForAdmin;
    function adminAwareRouter() {
        const hash = window.location.hash.slice(1);
        if (hash === '/admin') {
            if (!adminActive) showAdminLogin();
            return;
        }
        if (adminActive) {
            if (originalContent) {
                document.getElementById('content').innerHTML = originalContent;
                originalContent = null;
            }
            adminActive = false;
        }
        if (originalRouter) originalRouter();
    }
    window.addEventListener('hashchange', adminAwareRouter);
    window.addEventListener('DOMContentLoaded', adminAwareRouter);
    if (window.location.hash.slice(1) === '/admin') setTimeout(adminAwareRouter, 0);
})();
</script>
<!-- END_ADMIN -->
</body>
</html>
